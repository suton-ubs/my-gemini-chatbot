<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Gemini Multi-Model Chat</title><link rel="stylesheet" href="./style.css"/></head><body><main class="page"><section class="app" id="chatApp" aria-label="Gemini chat app"><button id="sidebarBackdrop" class="sidebar-backdrop" type="button" aria-label="Close sidebar"></button><aside class="sidebar" id="sidebar"><div class="sidebar-top"><button class="panel-icon" type="button" data-sidebar-toggle aria-label="Toggle sidebar"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="3"/><line x1="5" y1="1" x2="5" y2="15"/></svg></button></div><div class="search-wrap"><input id="sessionSearch" class="search-input" placeholder="Search session..."/></div><div id="chatList" class="chat-list" aria-label="Chat sessions"></div></aside><section class="main"><header class="main-topbar"><div class="main-topbar-left"><button class="panel-icon" type="button" data-sidebar-toggle aria-label="Toggle sidebar"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="3"/><line x1="5" y1="1" x2="5" y2="15"/></svg></button> <button class="main-topbar-btn" id="newChatButton" type="button"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 2l3 3-8 8H3v-3l8-8z"/></svg> New Chat <span class="kbd">Ctrl + /</span></button></div><div class="topbar-actions"><div class="top-control-group"><label class="top-label" for="accessCode">Access Code</label> <input id="accessCode" class="top-input" type="password" placeholder="Access code" autocomplete="current-password"/></div><div class="top-control-group"><label class="top-label" for="personalitySelect">Personality</label> <select id="personalitySelect" class="personality-select"><option value="">Default</option></select></div><div class="top-control-group"><label class="top-label" for="modelSelect">Model</label> <select id="modelSelect" class="model-select"><option value="">Loading models...</option></select></div><button id="jsonToggleButton" class="main-topbar-add" type="button">Show JSON</button></div></header><p id="personalityDescription" class="personality-description-bar" aria-live="polite">Model Default : use server default system instruction and generation settings.</p><section class="chat-section"><div id="chatLog" class="chat-log"></div></section><section class="input-area"><div class="input-box"><label class="sr-only" for="userMessage">Your message</label> <textarea id="userMessage" class="input-text" rows="3" placeholder="Start a new message..."></textarea><div class="input-toolbar"><button id="uploadButton" class="tool-btn" type="button" aria-label="Upload file"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6.2 8.6l3.6-3.6a2 2 0 112.8 2.8l-4.7 4.7a3.6 3.6 0 11-5.1-5.1l4.9-4.9"/></svg> Upload file</button> <input id="fileInput" class="hidden-file-input" type="file"/> <span id="selectedFileName" class="selected-file-name" hidden></span> <button id="clearButton" class="tool-btn tool-btn-muted" type="button">Clear</button><div class="spacer"></div><button id="sendButton" class="send-btn" type="button" aria-label="Send"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 11V3"/><path d="M3 7l4-4 4 4"/></svg></button></div></div></section><section id="resultSection" class="result-section is-hidden" aria-live="polite"><pre id="resultBox">No request yet.</pre></section></section><div id="loadingOverlay" class="loading-overlay is-hidden" role="status" aria-live="polite" aria-label="Waiting for AI response"><div class="loading-dialog"><div class="spinner-wheel" aria-hidden="true"></div><p>Processing request...</p></div></div><div id="errorModal" class="error-modal is-hidden" role="alertdialog" aria-modal="true" aria-labelledby="errorModalTitle" aria-describedby="errorModalMessage"><div class="error-modal-dialog"><h2 id="errorModalTitle" class="error-modal-title">Request Error</h2><p id="errorModalMessage" class="error-modal-message"></p><button id="errorModalCloseButton" class="error-modal-close" type="button">OK</button></div></div></section></main><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer="defer"></script><script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer="defer"></script><script src="./script.js" defer="defer"></script></body></html>
